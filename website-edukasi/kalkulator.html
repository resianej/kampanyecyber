<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalkulator Waktu Bermain</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef0ff;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.back{
display:inline-block;
padding:12px 20px;
background:linear-gradient(
90deg,
#6f4cff,
#b05dff
);
color:white;
text-decoration:none;
border-radius:15px;
font-weight:600;
margin-bottom:25px;
}

.card{

background:white;

padding:40px;

border-radius:25px;

box-shadow:
0 10px 25px
rgba(0,0,0,.08);

text-align:center;

}

h1{

font-size:42px;

color:#6f4cff;

margin-bottom:15px;

}

.subtitle{

color:#666;

line-height:1.8;

margin-bottom:30px;

}

.input-box{

margin:25px 0;

}

input{

width:200px;

padding:15px;

font-size:20px;

text-align:center;

border:2px solid #ddd;

border-radius:15px;

outline:none;

}

input:focus{

border-color:#6f4cff;

}

.result{

margin-top:35px;

display:none;

}

.result-box{

background:#f8f7ff;

padding:25px;

border-radius:20px;

margin-top:15px;

}

.result-number{

font-size:40px;

font-weight:800;

color:#6f4cff;

}

.equal{

font-size:30px;

font-weight:bold;

margin:15px 0;

color:#888;

}

.warning{

margin-top:25px;

padding:20px;

background:#fff8d6;

border-radius:15px;

line-height:1.8;

}

</style>

</head>

<body>

<div class="container">

<a href="index.html" class="back">
⬅ Kembali ke Beranda
</a>

<div class="card">

<h1>⏰ Kalkulator Waktu Bermain</h1>

<p class="subtitle">
Hitung berapa banyak waktu yang kamu habiskan untuk bermain game.
</p>

<div class="input-box">

<p>
Berapa jam kamu main per hari?
</p>

<br>

<input
type="number"
id="hours"
min="0"
placeholder="Contoh: 5"
oninput="calculateTime()">

</div>

<div class="result" id="result">

<div class="result-box">

<div class="result-number" id="daily">
0 Jam/Hari
</div>

<div class="equal">=</div>

<div class="result-number" id="weekly">
0 Jam/Minggu
</div>

<div class="equal">=</div>

<div class="result-number" id="monthly">
0 Jam/Bulan
</div>

</div>

<div class="warning" id="message">

</div>

</div>

</div>

</div>

<script>

function calculateTime(){

const hours =
parseFloat(
document.getElementById("hours").value
);

const result =
document.getElementById("result");

if(
isNaN(hours)
||
hours < 0
){

result.style.display =
"none";

return;

}

result.style.display =
"block";

const week =
hours * 7;

const month =
hours * 30;

document.getElementById(
"daily"
).innerHTML =
hours + " Jam/Hari";

document.getElementById(
"weekly"
).innerHTML =
week + " Jam/Minggu";

document.getElementById(
"monthly"
).innerHTML =
month + " Jam/Bulan";

let msg = "";

if(hours <= 2){

msg =
"✅ Waktu bermainmu masih tergolong seimbang jika tetap diimbangi dengan belajar, olahraga, dan istirahat.";

}
else if(hours <= 4){

msg =
"⚠️ Waktu bermainmu cukup tinggi. Pastikan tugas dan aktivitas penting tetap menjadi prioritas.";

}
else{

msg =
"🚨 Kamu menghabiskan cukup banyak waktu bermain. Coba evaluasi kembali jadwal harianmu agar tetap seimbang.";

}

document.getElementById(
"message"
).innerHTML =
msg;

}

</script>

</body>
</html>
